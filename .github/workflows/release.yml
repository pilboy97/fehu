name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write # Required for creating GitHub Releases

jobs:
  build:
    name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            bin: fehu-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            bin: fehu-darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            bin: fehu-darwin-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            bin: fehu-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1 # Required for go-sqlite3
        run: go build -o ${{ matrix.bin }} ./main/

      - name: Package Release (Unix)
        if: matrix.goos != 'windows'
        run: tar -czvf fehu-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz ${{ matrix.bin }} README.md

      - name: Package Release (Windows)
        if: matrix.goos == 'windows'
        run: Compress-Archive -Path ${{ matrix.bin }}, README.md -DestinationPath fehu-${{ matrix.goos }}-${{ matrix.goarch }}.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.tar.gz
          generate_release_notes: true